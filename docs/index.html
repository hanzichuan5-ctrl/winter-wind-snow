<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06111f" />
    <meta name="description" content="一场会回应鼠标的冬夜落雪。" />
    <title>风过雪庭 · Interactive Snow</title>
    <script type="module" crossorigin src="/winter-wind-snow/assets/index-CIZShp81.js"></script>
    <link rel="stylesheet" crossorigin href="/winter-wind-snow/assets/index-eB7qPUgP.css">
  </head>
  <body>
    <main id="winter-scene" class="winter-scene">
      <div class="scene-image" aria-hidden="true"></div>
      <div class="mist mist-one" aria-hidden="true"></div>
      <div class="mist mist-two" aria-hidden="true"></div>
      <canvas id="snow-canvas" aria-label="随鼠标流动的雪花动画"></canvas>

      <header class="topbar" data-capture-ignore="true">
        <a class="brand" href="#" aria-label="风过雪庭首页">
          <span class="brand-mark">雪</span>
          <span>
            <b>风过雪庭</b>
            <small>WINTER WIND STUDY / 01</small>
          </span>
        </a>
        <div class="weather-note">
          <span class="weather-dot"></span>
          <span>夜雪 · 微风</span>
        </div>
      </header>

      <section class="scene-copy" data-capture-ignore="true">
        <p class="eyebrow">INTERACTIVE WINTER</p>
        <h1>让风经过<br /><i>这一场雪。</i></h1>
        <p class="lede">移动鼠标，雪会记住风的方向。<br />点击夜空，拨开一圈短暂的涟漪。</p>
      </section>

      <aside class="controls" data-capture-ignore="true" aria-label="雪景控制">
        <button id="snow-level" class="control-button" type="button">
          <span class="button-symbol">✦</span>
          <span>
            <small>雪量</small>
            <b id="snow-level-label">漫天</b>
          </span>
        </button>
      </aside>

      <footer class="scene-footer" data-capture-ignore="true">
        <div class="interaction-hint">
          <span class="mouse-icon"><i></i></span>
          <span><b>移动鼠标造风</b><small>点击产生雪浪</small></span>
        </div>
        <p>CANVAS PARTICLES · VELOCITY WIND FIELD</p>
      </footer>

      <div id="toast" class="toast" data-capture-ignore="true" role="status" aria-live="polite"></div>
    </main>
  </body>
</html>
